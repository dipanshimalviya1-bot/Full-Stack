<!DOCTYPE html>

    <title>Document</title>
    <style>
        body{
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
        }

        .container {
            display: flex;
            gap: 50px;
            padding: 15px;
            overflow-x: auto;
            margin-left: 100px;
        }
        .story{
            text-align: center;
            width: 80px;
        }
        .your-story {
            height: 95px;
            width: 95px;
            padding: 3px;
            background: linear-gradient(rgb(66, 12, 167), black);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            position: fixed;
            left: 15px;
            top: 15px;
            z-index: 10; 
            gap: 30px;
        }
        

        .story-ring {
            height: 75px;
            width: 75px;
            padding: 3px;
            gap: 30px;
            background: linear-gradient(rgb(66, 12, 167), black);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            position: sticky;
        }
        .story-ring seen{
            background: gray;
            animation: none;
        }
        img{
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid black;
        }
        p{
            font-size: 12px;
            margin-top: 6px;
        }
        .add-btn{
            position: absolute;
            bottom: 0;
            right: 0;
            background: blue;
            color: white;
            border-radius: 50%;
            font-size: 14px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid black;
        }
        
    </style>
</head>
